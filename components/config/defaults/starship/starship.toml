"$schema" = "https://starship.rs/config-schema.json"
add_newline = false
palette = "catppuccin_mocha"

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "bold mauve"
truncation_length = 3
truncation_symbol = ".../"
read_only = " ro"
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
style = "blue"
symbol = "on "
format = "[$symbol$branch]($style) "

[git_status]
style = "yellow"
format = "([$all_status$ahead_behind]($style) )"

[python]
symbol = "py "
style = "sky"
format = "[$symbol$virtualenv]($style) "

[nodejs]
symbol = "node "
style = "green"
format = "[$symbol$version]($style) "

[rust]
symbol = "rs "
style = "peach"
format = "[$symbol$version]($style) "

[golang]
symbol = "go "
style = "sky"
format = "[$symbol$version]($style) "

[cmd_duration]
min_time = 2000
style = "overlay1"
format = "[$duration]($style) "

[character]
success_symbol = "[❯](bold mauve)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
