# Jackrose Glass Mocha launcher
font=Inter:size=14,Noto Sans CJK JP:size=14,JetBrainsMono Nerd Font:size=13
terminal=ghostty
prompt="Search "
placeholder=Open app or command
icon-theme=Papirus-Dark
width=48
lines=10
horizontal-pad=32
vertical-pad=24
inner-pad=12
anchor=top
y-margin=116
layer=overlay
match-mode=fuzzy
fields=name,generic,comment,categories,filename
use-bold=yes

[colors]
background=11111bd6
text=cdd6f4ff
prompt=cba6f7ff
placeholder=7f849cff
input=cdd6f4ff
match=89dcebff
selection=313244ee
selection-text=cdd6f4ff
selection-match=cba6f7ff
border=cba6f78c

[border]
width=1
radius=20
