# Cidre Seed Image Builder Profile Configuration
# Profile: cidre-seed

CIDRE_PROFILE_NAME="cidre-seed"
CIDRE_ARCH="aarch64"
CIDRE_BASE_ROOTFS=""
CIDRE_WORKDIR="work/cidre-seed"
CIDRE_ROOTFS_DIR="work/cidre-seed/rootfs"
CIDRE_OUTPUT_DIR="out"
CIDRE_LOCAL_PACKAGE_DIR="packages/out"
CIDRE_IMAGE_NAME="cidre-seed-aarch64"
CIDRE_IMAGE_FORMAT="tar.zst"

# Cidre custom environment packages
CIDRE_CIDRE_PACKAGES=(
  cidre-seed
  cidre-firstboot
  cidre-welcome
  cidre-healthcheck
  cidre-config
  cidre-user-setup
  cidre-meta-desktop-baseline
  cidre-experience-upgrade
  cidre-meta-desktop-optimized
)

# Base distribution required packages
CIDRE_BASE_PACKAGES=(
  networkmanager
  sudo
  bash
)

CIDRE_IMAGE_VERSION="0.10.0"
CIDRE_IMAGE_CHANNEL="local"
